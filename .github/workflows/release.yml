name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # macOS builds
          - os: macos-latest
            goos: darwin
            goarch: amd64
            name: aiman-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            name: aiman-darwin-arm64
          # Linux builds
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            name: aiman-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            name: aiman-linux-arm64
          # Windows builds
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            name: aiman-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -v -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ${{ matrix.name }} ./cmd/aiman

      - name: Create package (Unix)
        if: matrix.goos != 'windows'
        run: |
          tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Create package (Windows)
        if: matrix.goos == 'windows'
        run: |
          zip ${{ matrix.name }}.zip ${{ matrix.name }}
          shasum -a 256 ${{ matrix.name }}.zip > ${{ matrix.name }}.zip.sha256

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aiman-*
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
